version: '3.8'

services:
  # กล่องเก็บฐานข้อมูล MySQL
  db:
    image: mysql:8.0
    container_name: foodrandom_mysql_container
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: food_db
    ports:
      - "3306:3306"

  # กล่องโปรแกรม phpMyAdmin สำหรับเข้าไปหน้าตาเว็บจัดการฐานข้อมูล
  my-phpmyadmin:
    image: phpmyadmin:latest
    container_name: foodrandom_pma_container
    restart: always
    ports:
      - "8081:80"

volumes:
  mysql_data: